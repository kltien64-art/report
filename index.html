<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成式 AI 工作坊 - 報名系統</title>
    <!-- 引入優雅字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&family=Noto+Sans+TC:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f3ed;
            --text-main: #2c2c2c;
            --text-light: #6b6b6b;
            --accent: #000000;
            --border-color: #d1cfcb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.8;
            letter-spacing: 0.05em;
            padding: 100px 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        /* 標題與簡介 */
        header { margin-bottom: 120px; text-align: left; }
        .category-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--text-light); margin-bottom: 20px; display: block; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 2.8rem; font-weight: 500; line-height: 1.2; margin-bottom: 40px; color: var(--accent); }
        .intro-text { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; max-width: 600px; color: var(--text-light); font-style: italic; }

        /* 區塊樣式 */
        .section { margin-bottom: 100px; }
        .section-title { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-weight: 500; }

        /* 表單元素 */
        .form-group { margin-bottom: 50px; position: relative; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 15px; letter-spacing: 0.1em; }

        input[type="text"], input[type="email"], textarea {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-color);
            padding: 10px 0; font-family: 'Noto Serif TC', serif; font-size: 1.2rem; color: var(--accent); outline: none; transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus { border-bottom: 1px solid var(--accent); }

        /* 自定義選項樣式 */
        .options-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 10px; }
        .option-item { display: flex; align-items: center; cursor: pointer; font-size: 0.95rem; font-weight: 300; }
        .option-item input { display: none; }
        .custom-checkbox { width: 16px; height: 16px; border: 1px solid var(--border-color); margin-right: 12px; display: inline-block; position: relative; transition: all 0.3s; }
        .option-item input:checked + .custom-checkbox { background-color: var(--accent); border-color: var(--accent); }

        /* 提交按鈕 */
        .submit-btn {
            background-color: var(--accent); color: #ffffff; border: none; padding: 20px 60px; font-size: 0.9rem;
            letter-spacing: 0.4em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
            margin-top: 40px; width: 100%; font-family: 'Noto Sans TC', sans-serif;
        }
        .submit-btn:hover { opacity: 0.8; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        footer { margin-top: 100px; padding-top: 40px; border-top: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-light); text-align: center; }

        /* 載入中遮罩 */
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247, 243, 237, 0.9); z-index: 1000; justify-content: center; align-items: center;
            font-family: 'Noto Serif TC', serif; font-style: italic; letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">處理中 / Processing...</div>

<div class="container">
    <header>
        <span class="category-label">Education & Training Workshop</span>
        <h1>生成式 AI 驅動<br>教學行政效率翻倍工作坊</h1>
        <p class="intro-text">數據驅動決策，極簡主義美學下的高效行政管理。</p>
    </header>

    <form id="registrationForm">
        <div class="section">
            <h2 class="section-title">報名資料 / Registration</h2>
            
            <div class="form-group">
                <label>姓名 Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>電子郵件 Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>單位 Department</label>
                <input type="text" id="dept" required>
            </div>

            <div class="form-group">
                <label>職稱 Position</label>
                <div class="options-group">
                    <label class="option-item"><input type="radio" name="job" value="醫師" required><span class="custom-checkbox"></span> 醫師</label>
                    <label class="option-item"><input type="radio" name="job" value="護理師"><span class="custom-checkbox"></span> 護理師</label>
                    <label class="option-item"><input type="radio" name="job" value="醫事人員"><span class="custom-checkbox"></span> 醫事人員</label>
                    <label class="option-item"><input type="radio" name="job" value="行政人員"><span class="custom-checkbox"></span> 行政人員</label>
                    <label class="option-item"><input type="radio" name="job" value="其他"><span class="custom-checkbox"></span> 其他</label>
                </div>
            </div>

            <div class="form-group">
                <label>是否需要茶水點心？ Catering</label>
                <div class="options-group">
                    <label class="option-item"><input type="radio" name="food" value="是" required><span class="custom-checkbox"></span> 是</label>
                    <label class="option-item"><input type="radio" name="food" value="否"><span class="custom-checkbox"></span> 否</label>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">需求調查 / Survey</h2>

            <div class="form-group">
                <label>【AI 使用頻率】</label>
                <div class="options-group">
                    <label class="option-item"><input type="radio" name="freq" value="重度"><span class="custom-checkbox"></span> 重度使用者</label>
                    <label class="option-item"><input type="radio" name="freq" value="中度"><span class="custom-checkbox"></span> 中度使用者</label>
                    <label class="option-item"><input type="radio" name="freq" value="輕度"><span class="custom-checkbox"></span> 輕度使用者</label>
                    <label class="option-item"><input type="radio" name="freq" value="新手"><span class="custom-checkbox"></span> 新手</label>
                </div>
            </div>

            <div class="form-group">
                <label>【工具經驗】 (可複選)</label>
                <div class="options-group">
                    <label class="option-item"><input type="checkbox" name="tools" value="ChatGPT"><span class="custom-checkbox"></span> ChatGPT</label>
                    <label class="option-item"><input type="checkbox" name="tools" value="Gemini"><span class="custom-checkbox"></span> Gemini</label>
                    <label class="option-item"><input type="checkbox" name="tools" value="Copilot"><span class="custom-checkbox"></span> Copilot</label>
                    <label class="option-item"><input type="checkbox" name="tools" value="Midjourney"><span class="custom-checkbox"></span> Midjourney</label>
                    <label class="option-item"><input type="checkbox" name="tools" value="Notion AI"><span class="custom-checkbox"></span> Notion AI</label>
                </div>
            </div>

            <div class="form-group">
                <label>【信心指數】 (1-5分)</label>
                <div class="options-group">
                    <label class="option-item"><input type="radio" name="conf" value="1"><span class="custom-checkbox"></span> 1分</label>
                    <label class="option-item"><input type="radio" name="conf" value="2"><span class="custom-checkbox"></span> 2分</label>
                    <label class="option-item"><input type="radio" name="conf" value="3"><span class="custom-checkbox"></span> 3分</label>
                    <label class="option-item"><input type="radio" name="conf" value="4"><span class="custom-checkbox"></span> 4分</label>
                    <label class="option-item"><input type="radio" name="conf" value="5"><span class="custom-checkbox"></span> 5分</label>
                </div>
            </div>

            <div class="form-group">
                <label>【需求痛點】 (可複選)</label>
                <div class="options-group">
                    <label class="option-item"><input type="checkbox" name="pain" value="文案撰寫"><span class="custom-checkbox"></span> 文案撰寫</label>
                    <label class="option-item"><input type="checkbox" name="pain" value="會議記錄"><span class="custom-checkbox"></span> 會議記錄</label>
                    <label class="option-item"><input type="checkbox" name="pain" value="數據處理"><span class="custom-checkbox"></span> 數據處理</label>
                    <label class="option-item"><input type="checkbox" name="pain" value="簡報製作"><span class="custom-checkbox"></span> 簡報製作</label>
                    <label class="option-item"><input type="checkbox" name="pain" value="資訊檢索"><span class="custom-checkbox"></span> 資訊檢索</label>
                </div>
            </div>

            <div class="form-group">
                <label>【會前補充】 目前遇到的困難或想對講師說的話</label>
                <textarea id="note" rows="2" placeholder="在此輸入..."></textarea>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">提交報名 Application</button>
    </form>

    <footer>
        <p>奇美醫院教學部 | 聯絡人：盧英云 (分機57425)</p>
    </footer>
</div>

<script>
    const form = document.getElementById('registrationForm');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');
    
    // 您的 Apps Script 網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdnUXuBJRAEcU1FRArPqhRkkEpLna8MKnfS-07OnlLVRzowpALP2pd-Y7Xkh_94kbo/exec"; 

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // 顯示載入遮罩並禁用按鈕
        loading.style.display = 'flex';
        submitBtn.disabled = true;
        
        // 蒐集複選資料 (轉換為字串)
        const tools = Array.from(document.querySelectorAll('input[name="tools"]:checked')).map(el => el.value).join(', ');
        const painPoints = Array.from(document.querySelectorAll('input[name="pain"]:checked')).map(el => el.value).join(', ');
        
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            dept: document.getElementById('dept').value,
            job: document.querySelector('input[name="job"]:checked')?.value || "",
            food: document.querySelector('input[name="food"]:checked')?.value || "",
            freq: document.querySelector('input[name="freq"]:checked')?.value || "",
            tools: tools,
            confidence: document.querySelector('input[name="conf"]:checked')?.value || "",
            painPoints: painPoints,
            note: document.getElementById('note').value
        };

        // 使用 Fetch POST 傳送資料
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // 使用 no-cors 模式繞過瀏覽器限制
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            // 由於 no-cors 模式無法取得 response，我們默認成功
            loading.style.display = 'none';
            submitBtn.disabled = false;
            alert('報名資料已成功傳送至試算表！');
            form.reset();
        })
        .catch(error => {
            loading.style.display = 'none';
            submitBtn.disabled = false;
            console.error('Error!', error.message);
            alert('傳送過程中發生錯誤，請稍後再試。');
        });
    });
</script>

</body>
</html>
